openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Insta-Study peer-to-peer tutoring platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: tutors
    description: Tutor operations
  - name: availability
    description: Tutor availability operations
  - name: bookings
    description: Booking operations
  - name: dashboard
    description: Dashboard operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tutors:
    get:
      operationId: listTutors
      tags: [tutors]
      summary: List and search tutors
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: subject
          in: query
          schema:
            type: string
        - name: minRating
          in: query
          schema:
            type: number
        - name: maxRate
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of tutors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TutorProfile"

  /tutors/apply:
    post:
      operationId: applyTutor
      tags: [tutors]
      summary: Apply to become a tutor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TutorApplicationBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TutorProfile"
        "400":
          description: Already applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tutors/my-profile:
    get:
      operationId: getMyTutorProfile
      tags: [tutors]
      summary: Get current user's tutor profile
      responses:
        "200":
          description: Tutor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TutorProfile"
        "404":
          description: No tutor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateMyTutorProfile
      tags: [tutors]
      summary: Update current user's tutor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTutorProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TutorProfile"

  /tutors/{tutorId}:
    get:
      operationId: getTutor
      tags: [tutors]
      summary: Get tutor profile by ID
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tutor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TutorProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tutors/{tutorId}/availability:
    get:
      operationId: getTutorAvailability
      tags: [availability]
      summary: Get availability slots for a tutor
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"

    post:
      operationId: createAvailabilitySlot
      tags: [availability]
      summary: Add an availability slot
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAvailabilitySlotBody"
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tutors/{tutorId}/availability/{slotId}:
    delete:
      operationId: deleteAvailabilitySlot
      tags: [availability]
      summary: Delete an availability slot
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
        - name: slotId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings:
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: List bookings for the current user (as student or tutor)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [student, tutor]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled, rejected]
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Slot not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{bookingId}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status (accept, reject, cancel, complete)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary for the current user
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /tutors/featured:
    get:
      operationId: getFeaturedTutors
      tags: [tutors]
      summary: Get featured/top-rated tutors for homepage
      responses:
        "200":
          description: Featured tutors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TutorProfile"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide stats (admin only)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications:
    get:
      operationId: listAdminApplications
      tags: [admin]
      summary: List tutor applications (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of tutor applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TutorApplication"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications/{tutorId}/approve:
    patch:
      operationId: approveApplication
      tags: [admin]
      summary: Approve a tutor application (admin only)
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/applications/{tutorId}/reject:
    patch:
      operationId: rejectApplication
      tags: [admin]
      summary: Reject a tutor application (admin only)
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isTutor:
          type: boolean
        isAdmin:
          type: boolean
        tutorStatus:
          type: string
          enum: [none, pending, approved, rejected]
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - isTutor
        - isAdmin
        - createdAt

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string

    TutorProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        subjects:
          type: array
          items:
            type: string
        experience:
          type: string
          nullable: true
        hourlyRate:
          type: number
        rating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - subjects
        - hourlyRate
        - reviewCount
        - status
        - createdAt

    TutorApplicationBody:
      type: object
      properties:
        subjects:
          type: array
          items:
            type: string
        experience:
          type: string
        hourlyRate:
          type: number
        bio:
          type: string
      required:
        - subjects
        - experience
        - hourlyRate

    UpdateTutorProfileBody:
      type: object
      properties:
        subjects:
          type: array
          items:
            type: string
        experience:
          type: string
        hourlyRate:
          type: number
        bio:
          type: string

    AvailabilitySlot:
      type: object
      properties:
        id:
          type: integer
        tutorId:
          type: integer
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isBooked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tutorId
        - startTime
        - endTime
        - isBooked
        - createdAt

    CreateAvailabilitySlotBody:
      type: object
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
      required:
        - startTime
        - endTime

    Booking:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        tutorId:
          type: integer
        slotId:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled, rejected]
        subject:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        student:
          $ref: "#/components/schemas/User"
        tutor:
          $ref: "#/components/schemas/TutorProfile"
        slot:
          $ref: "#/components/schemas/AvailabilitySlot"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - tutorId
        - slotId
        - status
        - createdAt

    CreateBookingBody:
      type: object
      properties:
        tutorId:
          type: integer
        slotId:
          type: integer
        subject:
          type: string
        notes:
          type: string
      required:
        - tutorId
        - slotId

    UpdateBookingBody:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, completed, cancelled, rejected]
      required:
        - status

    DashboardData:
      type: object
      properties:
        upcomingBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        pendingRequests:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        suggestedTutors:
          type: array
          items:
            $ref: "#/components/schemas/TutorProfile"
        tutorProfile:
          $ref: "#/components/schemas/TutorProfile"
          nullable: true
        stats:
          $ref: "#/components/schemas/DashboardStats"
      required:
        - upcomingBookings
        - pendingRequests
        - suggestedTutors
        - stats

    DashboardStats:
      type: object
      properties:
        totalBookings:
          type: integer
        completedSessions:
          type: integer
        pendingBookings:
          type: integer
        totalEarnings:
          type: number
      required:
        - totalBookings
        - completedSessions
        - pendingBookings
        - totalEarnings

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        activeTutors:
          type: integer
        pendingApplications:
          type: integer
        rejectedApplications:
          type: integer
      required:
        - totalUsers
        - activeTutors
        - pendingApplications
        - rejectedApplications

    TutorApplication:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        subjects:
          type: array
          items:
            type: string
        experience:
          type: string
          nullable: true
        hourlyRate:
          type: number
        rating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - email
        - subjects
        - hourlyRate
        - reviewCount
        - status
        - createdAt
